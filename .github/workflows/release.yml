name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.name }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            name: linux-x86_64
            binary: tui-kanban
            extension: ""
          - os: windows-latest
            name: windows-x86_64
            binary: tui-kanban.exe
            extension: .exe

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable

      - run: cargo build --release --bin tui-kanban

      - name: Stage release file
        shell: bash
        run: |
          mkdir -p release
          cp target/release/${{ matrix.binary }} release/focus-list-${{ matrix.name }}${{ matrix.extension }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.name }}
          path: release/*

  release:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          path: release-assets

      - uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: release-assets/**/*
